apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-deployment
  labels:
    app: monster-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: monster-backend
  template:
    metadata:
      labels:
        app: monster-backend
    spec:
      containers:
        - name: backend
          image: monster-back:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: monster-db-secret
                  key: DATABASE_URL
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"