name: Deploy

on:
  workflow_run:
    workflows: ["Docker Build and Push"]
    types:
      - completed
    branches: [main]
  
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production
      tag:
        description: 'Docker image tag to deploy'
        required: true
        default: 'latest'
        type: string

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  deploy-staging:
    if: (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main') || (github.event_name == 'workflow_dispatch' && inputs.environment == 'staging')
    runs-on: ubuntu-latest
    environment: staging
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set image tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "IMAGE_TAG=${{ inputs.tag }}" >> $GITHUB_ENV
          else
            echo "IMAGE_TAG=main" >> $GITHUB_ENV
          fi

      - name: Deploy to staging
        run: |
          echo "Deploying image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}"
          echo "This is where you would deploy to your staging environment"
          # Example deployment commands:
          # kubectl set image deployment/monster-back monster-back=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          # docker service update --image ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} monster-back

  deploy-production:
    if: github.event_name == 'workflow_dispatch' && inputs.environment == 'production'
    runs-on: ubuntu-latest
    environment: production
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy to production
        run: |
          echo "Deploying image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ inputs.tag }}"
          echo "This is where you would deploy to your production environment"
          # Example deployment commands:
          # kubectl set image deployment/monster-back monster-back=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ inputs.tag }}
          # docker service update --image ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ inputs.tag }} monster-back

  notify:
    needs: [deploy-staging, deploy-production]
    if: always()
    runs-on: ubuntu-latest
    
    steps:
      - name: Notify deployment status
        run: |
          if [ "${{ needs.deploy-staging.result }}" = "success" ]; then
            echo "✅ Staging deployment successful"
          fi
          if [ "${{ needs.deploy-production.result }}" = "success" ]; then
            echo "✅ Production deployment successful"
          fi
          # Add notification logic here (Slack, Discord, email, etc.)