version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: monster-postgres
    environment:
      POSTGRES_DB: monster_db
      POSTGRES_USER: monster_user
      POSTGRES_PASSWORD: monster_password
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data: